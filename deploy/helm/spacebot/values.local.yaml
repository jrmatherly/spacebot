# Local-development overrides for Spacebot Helm values.
#
# Layered on top of values.yaml for single-node clusters (minikube, kind,
# k3d, Talos-in-Docker). Replaces the data PVC with an emptyDir so you don't
# need a StorageClass, disables the ConfigMap mount (no cluster-side
# configmap.yaml.j2 to render against), disables the ServiceMonitor (no
# Prometheus Operator in most local setups), and relaxes probes for slower
# boot on laptops.
#
# Install:
#   helm install spacebot oci://ghcr.io/bjw-s-labs/helm/app-template \
#     --version 4.6.2 \
#     -f deploy/helm/spacebot/values.yaml \
#     -f deploy/helm/spacebot/values.local.yaml
#
# Port-forward to test the UI:
#   kubectl port-forward svc/spacebot 19898:19898

defaultPodOptions:
  # Reloader annotations target secrets/configmaps that don't exist locally;
  # overriding with an empty map clears them and avoids noise in kubectl describe.
  annotations: {}

controllers:
  spacebot:
    containers:
      app:
        # Local dev has no ConfigMap backing spacebot.toml. Drop the
        # -c /etc/spacebot/config.toml argument and let the daemon fall
        # back to its default instance_dir resolution ($SPACEBOT_DIR then
        # ~/.spacebot). Keep foreground mode.
        #
        # The first element MUST be "spacebot" because the Dockerfile
        # entrypoint is docker-entrypoint.sh which ends with `exec "$@"`
        # and app-template's `args:` fully replaces the Dockerfile CMD.
        args:
          - "spacebot"
          - "start"
          - "-f"
        # Local dev runs without the secret-backed API keys; keep only
        # the baseline environment. Remove envFrom so the pod doesn't wait
        # for a secret that was never created.
        envFrom: []
        env:
          SPACEBOT_DIR: /data
          SPACEBOT_DEPLOYMENT: docker
          RUST_LOG: debug
        # More forgiving startup probe for laptop-class compute.
        probes:
          startup:
            spec:
              failureThreshold: 60  # 305s headroom

persistence:
  data:
    # Swap PVC for emptyDir: no StorageClass required, state lost on pod
    # restart. Fine for smoke tests; use PVC values for anything persistent.
    enabled: true
    type: emptyDir

  # Disable the ConfigMap mount; there is no cluster-side ConfigMap in
  # local testing. The daemon's -c flag is removed in the args override
  # above so the daemon won't try to read from /etc/spacebot/.
  config:
    enabled: false

  # /tmp and chrome-cache emptyDirs are still needed because the container
  # retains readOnlyRootFilesystem: true from values.yaml. No override.

serviceMonitor:
  app:
    enabled: false
