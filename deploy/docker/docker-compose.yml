# Spacebot dev/test compose stack.
# One file, six profiles. See deploy/docker/README.md for usage.
# Design: docs/design-docs/docker-compose-variant.md
#
# Compose v2 ignores the `version` key; omitting it is correct.

services:
  # ====================================================================
  # spacebot — default profile. Published image, digest-pinned.
  # ====================================================================
  spacebot:
    profiles: [default]
    image: ghcr.io/jrmatherly/spacebot@${SPACEBOT_IMAGE_DIGEST}
    container_name: spacebot
    restart: unless-stopped
    # The -c flag decouples the config file from the /data volume so
    # ./config.toml can be bind-mounted read-only. `start -f` runs the
    # daemon in the foreground; required in containers since the Rust
    # binary daemonizes by default. Matches the K8s deployment's args
    # pattern (see deploy/helm/spacebot/values.yaml).
    #
    # The first element MUST be "spacebot" because the Dockerfile
    # entrypoint is docker-entrypoint.sh which ends with `exec "$@"`.
    # Compose `command:` fully REPLACES the Dockerfile CMD, so without
    # the binary name the entrypoint tries to exec "-c" as a program.
    command: ["spacebot", "-c", "/etc/spacebot/config.toml", "start", "-f"]
    env_file:
      - path: .env
        required: false
    environment:
      SPACEBOT_DIR: /data
      SPACEBOT_DEPLOYMENT: docker
      RUST_LOG: ${RUST_LOG:-info}
      # OTLP tracing. Empty by default so tracing is off in the `default`
      # profile. When the `observability` profile brings up Alloy, set
      # OTEL_EXPORTER_OTLP_ENDPOINT=http://alloy:4317 in `.env` (or export
      # it in the shell before `docker compose up`). Matches the cluster
      # deployment's Grafana Alloy endpoint.
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-spacebot}
    ports:
      - "${SPACEBOT_BIND:-127.0.0.1}:19898:19898"
      - "${SPACEBOT_BIND:-127.0.0.1}:9090:9090"
      # Optional webhook receiver (enabled per-config in spacebot.toml, see
      # docs/content/docs/(getting-started)/docker.mdx). Harmless when unused.
      - "${SPACEBOT_BIND:-127.0.0.1}:18789:18789"
    volumes:
      - spacebot-data:/data
      # config.toml enables the [metrics] endpoint so the `observability`
      # profile's Prometheus scrape returns real data. Without this mount
      # the daemon's [metrics].enabled defaults to false and the Grafana
      # dashboard silently shows no data.
      - ./config.toml:/etc/spacebot/config.toml:ro
    networks:
      - spacebot-net
      - mcp-net
    # /api/health is exempted from bearer auth in src/api/server.rs; no
    # credentials needed. Spacedrive's /health IS behind Basic Auth — that
    # asymmetry is intentional, not a bug.
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:19898/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ====================================================================
  # spacebot-build — build profile. Rebuilds from root Dockerfile.
  # Mutually exclusive with default: both bind port 19898.
  # ====================================================================
  spacebot-build:
    profiles: [build]
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: spacebot
    restart: unless-stopped
    # Same -c flag + mount pattern as the `spacebot` service. The
    # binary name is mandatory; see the comment on the `spacebot`
    # service's command for why.
    command: ["spacebot", "-c", "/etc/spacebot/config.toml", "start", "-f"]
    env_file:
      - path: .env
        required: false
    environment:
      SPACEBOT_DIR: /data
      SPACEBOT_DEPLOYMENT: docker
      RUST_LOG: ${RUST_LOG:-info}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-spacebot}
    ports:
      - "${SPACEBOT_BIND:-127.0.0.1}:19898:19898"
      - "${SPACEBOT_BIND:-127.0.0.1}:9090:9090"
      - "${SPACEBOT_BIND:-127.0.0.1}:18789:18789"
    volumes:
      - spacebot-data:/data
      - ./config.toml:/etc/spacebot/config.toml:ro
    networks:
      - spacebot-net
      - mcp-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:19898/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ====================================================================
  # spacedrive — integration harness. Builds from in-tree spacedrive/.
  # Per spec §4.3: real env API is single SD_AUTH "user:pass" var.
  # No fallback; unset SD_AUTH fails the healthcheck and keeps the
  # container marked unhealthy.
  # ====================================================================
  spacedrive:
    profiles: [spacedrive]
    build:
      context: ../../spacedrive
      dockerfile: Dockerfile
    container_name: spacedrive
    restart: unless-stopped
    environment:
      SD_DATA_DIR: /data
      SD_AUTH: ${SD_AUTH}
    ports:
      - "${SPACEBOT_BIND:-127.0.0.1}:8080:8080"
    volumes:
      - spacedrive-data:/data
    networks:
      - spacebot-net
    # When SD_AUTH is "disabled" (documented in spacedrive/apps/server/src/main.rs:269),
    # sd-server turns auth off entirely. Basic Auth with empty-ish creds still succeeds
    # against a disabled-auth server, so `curl -u "$$SD_AUTH"` works in both modes.
    healthcheck:
      test: ["CMD-SHELL", "curl -f -u \"$$SD_AUTH\" http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ====================================================================
  # caddy — proxy profile. Reverse proxy with local CA.
  # Admin port 2019 deliberately NOT exposed to host.
  # ====================================================================
  caddy:
    profiles: [proxy]
    image: caddy:2
    container_name: spacebot-caddy
    restart: unless-stopped
    ports:
      - "${SPACEBOT_BIND:-127.0.0.1}:80:80"
      - "${SPACEBOT_BIND:-127.0.0.1}:443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - spacebot-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:2019/config/apps/http/servers"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ====================================================================
  # prometheus — observability profile. Scrapes spacebot metrics.
  # ====================================================================
  prometheus:
    profiles: [observability]
    image: prom/prometheus:v3.0.0
    container_name: spacebot-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
      - "--storage.tsdb.retention.size=1GB"
    ports:
      - "${SPACEBOT_BIND:-127.0.0.1}:9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - spacebot-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ====================================================================
  # alloy — observability profile. OTLP collector matching the production
  # cluster's Grafana Alloy deployment. SpaceBot emits OTLP traces when
  # OTEL_EXPORTER_OTLP_ENDPOINT is set (src/config/load.rs:975-977);
  # the envvar is set on the `spacebot` service only when this profile
  # is activated (see the x-spacebot-alloy-env extension below).
  #
  # Grafana Alloy is the successor to Grafana Agent / otel-collector for
  # Grafana-native stacks. Port 4317 is OTLP gRPC (used by SpaceBot);
  # port 4318 is OTLP HTTP, exposed for external integrations.
  # ====================================================================
  alloy:
    profiles: [observability]
    image: grafana/alloy:v1.11.2
    container_name: spacebot-alloy
    restart: unless-stopped
    command:
      - "run"
      - "--server.http.listen-addr=0.0.0.0:12345"
      - "/etc/alloy/config.alloy"
    ports:
      - "${SPACEBOT_BIND:-127.0.0.1}:4317:4317"  # OTLP gRPC (internal + host)
      - "${SPACEBOT_BIND:-127.0.0.1}:4318:4318"  # OTLP HTTP
      - "${SPACEBOT_BIND:-127.0.0.1}:12345:12345"  # Alloy UI (troubleshooting)
    volumes:
      - ./alloy-config.alloy:/etc/alloy/config.alloy:ro
    networks:
      - spacebot-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:12345/-/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ====================================================================
  # grafana — observability profile. Requires Prometheus healthy first.
  # No working credential defaults per spec §4.3 / reviewer sweep Sec-1.
  # ====================================================================
  grafana:
    profiles: [observability]
    image: grafana/grafana:11.3.0
    container_name: spacebot-grafana
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD}
      GF_AUTH_ANONYMOUS_ENABLED: ${GF_ANONYMOUS:-false}
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    ports:
      - "${SPACEBOT_BIND:-127.0.0.1}:3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    networks:
      - spacebot-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ====================================================================
  # dbtools — tooling profile. Read-only SQLite/redb inspection shell.
  # :ro is a footgun guard, not a security boundary. Anyone can
  # docker compose exec --user=root and remount rw.
  # ====================================================================
  dbtools:
    profiles: [tooling]
    build:
      context: .
      dockerfile: dbtools.Dockerfile
    container_name: spacebot-dbtools
    restart: unless-stopped
    volumes:
      - spacebot-data:/data:ro
    networks:
      - spacebot-net
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # ====================================================================
  # mcp-stub — tooling profile. Stub MCP server on isolated mcp-net.
  # Reviewer sweep Sec-11: MCP servers are their own trust domain.
  # ====================================================================
  mcp-stub:
    profiles: [tooling]
    build:
      context: ./mcp-stub
      dockerfile: Dockerfile
    container_name: spacebot-mcp-stub
    restart: unless-stopped
    # No ports: published to host. Reachable only from inside mcp-net.
    expose:
      - "3001"
    networks:
      - mcp-net
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

networks:
  spacebot-net:
    driver: bridge
  mcp-net:
    driver: bridge

volumes:
  spacebot-data:
    driver: local
  spacedrive-data:
    driver: local
  caddy-data:
    driver: local
  caddy-config:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
