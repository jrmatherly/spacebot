# Spacebot dev/test compose stack.
# One file, six profiles. See deploy/docker/README.md for usage.
# Spec: .scratchpad/2026-04-17-docker-compose-variant-design.md
#
# Compose v2 ignores the `version` key; omitting it is correct.

services:
  # ====================================================================
  # spacebot — default profile. Published image, digest-pinned.
  # ====================================================================
  spacebot:
    profiles: [default]
    image: ghcr.io/jrmatherly/spacebot@${SPACEBOT_IMAGE_DIGEST}
    container_name: spacebot
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      SPACEBOT_DIR: /data
      SPACEBOT_DEPLOYMENT: docker
      RUST_LOG: ${RUST_LOG:-info}
    ports:
      - "${SPACEBOT_BIND:-127.0.0.1}:19898:19898"
      - "${SPACEBOT_BIND:-127.0.0.1}:9090:9090"
      # Optional webhook receiver (enabled per-config in spacebot.toml, see
      # docs/content/docs/(getting-started)/docker.mdx). Harmless when unused.
      - "${SPACEBOT_BIND:-127.0.0.1}:18789:18789"
    volumes:
      - spacebot-data:/data
    networks:
      - spacebot-net
    # /api/health is exempted from bearer auth in src/api/server.rs; no
    # credentials needed. Spacedrive's /health IS behind Basic Auth — that
    # asymmetry is intentional, not a bug.
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:19898/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  spacebot-net:
    driver: bridge

volumes:
  spacebot-data:
    driver: local
