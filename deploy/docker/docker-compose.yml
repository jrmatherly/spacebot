# Spacebot dev/test compose stack.
# One file, six profiles. See deploy/docker/README.md for usage.
# Spec: .scratchpad/2026-04-17-docker-compose-variant-design.md
#
# Compose v2 ignores the `version` key; omitting it is correct.

services:
  # ====================================================================
  # spacebot — default profile. Published image, digest-pinned.
  # ====================================================================
  spacebot:
    profiles: [default]
    image: ghcr.io/jrmatherly/spacebot@${SPACEBOT_IMAGE_DIGEST}
    container_name: spacebot
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      SPACEBOT_DIR: /data
      SPACEBOT_DEPLOYMENT: docker
      RUST_LOG: ${RUST_LOG:-info}
    ports:
      - "${SPACEBOT_BIND:-127.0.0.1}:19898:19898"
      - "${SPACEBOT_BIND:-127.0.0.1}:9090:9090"
      # Optional webhook receiver (enabled per-config in spacebot.toml, see
      # docs/content/docs/(getting-started)/docker.mdx). Harmless when unused.
      - "${SPACEBOT_BIND:-127.0.0.1}:18789:18789"
    volumes:
      - spacebot-data:/data
    networks:
      - spacebot-net
    # /api/health is exempted from bearer auth in src/api/server.rs; no
    # credentials needed. Spacedrive's /health IS behind Basic Auth — that
    # asymmetry is intentional, not a bug.
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:19898/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ====================================================================
  # spacebot-build — build profile. Rebuilds from root Dockerfile.
  # Mutually exclusive with default: both bind port 19898.
  # ====================================================================
  spacebot-build:
    profiles: [build]
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: spacebot
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      SPACEBOT_DIR: /data
      SPACEBOT_DEPLOYMENT: docker
      RUST_LOG: ${RUST_LOG:-info}
    ports:
      - "${SPACEBOT_BIND:-127.0.0.1}:19898:19898"
      - "${SPACEBOT_BIND:-127.0.0.1}:9090:9090"
      - "${SPACEBOT_BIND:-127.0.0.1}:18789:18789"
    volumes:
      - spacebot-data:/data
    networks:
      - spacebot-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:19898/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ====================================================================
  # spacedrive — integration harness. Builds from in-tree spacedrive/.
  # Per spec §4.3: real env API is single SD_AUTH "user:pass" var.
  # No fallback; unset SD_AUTH fails the healthcheck and keeps the
  # container marked unhealthy.
  # ====================================================================
  spacedrive:
    profiles: [spacedrive]
    build:
      context: ../../spacedrive
      dockerfile: Dockerfile
    container_name: spacedrive
    restart: unless-stopped
    environment:
      SD_DATA_DIR: /data
      SD_AUTH: ${SD_AUTH}
    ports:
      - "${SPACEBOT_BIND:-127.0.0.1}:8080:8080"
    volumes:
      - spacedrive-data:/data
    networks:
      - spacebot-net
    # When SD_AUTH is "disabled" (documented in spacedrive/apps/server/src/main.rs:269),
    # sd-server turns auth off entirely. Basic Auth with empty-ish creds still succeeds
    # against a disabled-auth server, so `curl -u "$$SD_AUTH"` works in both modes.
    healthcheck:
      test: ["CMD-SHELL", "curl -f -u \"$$SD_AUTH\" http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  spacebot-net:
    driver: bridge

volumes:
  spacebot-data:
    driver: local
  spacedrive-data:
    driver: local
