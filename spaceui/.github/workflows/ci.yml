name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      
      - name: Install dependencies
        run: bun install
      
      - name: Type check
        run: bun run typecheck
      
      - name: Build packages
        run: bun run build
      
      - name: Verify exports
        run: |
          # Check that all packages have built successfully
          for pkg in packages/*; do
            if [ -d "$pkg/dist" ]; then
              echo "✓ $pkg built"
            else
              echo "✗ $pkg missing dist"
              exit 1
            fi
          done

  test:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      
      - name: Install dependencies
        run: bun install
      
      - name: Build packages
        run: bun run build
      
      - name: Test showcase app build
        run: |
          cd examples/showcase
          bun run build

  changeset:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Check for changeset
        run: |
          if git diff --name-only origin/main | grep -q "\.changeset/"; then
            echo "✓ Changeset found"
          else
            echo "⚠ No changeset found. Run 'bun run changeset' if this PR includes user-facing changes."
          fi
