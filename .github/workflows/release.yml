name: 🚀 Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (e.g. v0.1.0). Defaults to git ref."
        required: false

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository_owner }}/spacebot

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-version:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Verify Cargo.toml version matches tag
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "Git tag version:    $TAG"
          echo "Cargo.toml version: $CARGO_VERSION"
          if [ "$TAG" != "$CARGO_VERSION" ]; then
            echo "::error::Version mismatch! Git tag is v${TAG} but Cargo.toml has version ${CARGO_VERSION}. Bump the version in Cargo.toml before tagging."
            exit 1
          fi

  build-binaries:
    needs: [verify-version]
    if: always() && (needs.verify-version.result == 'success' || needs.verify-version.result == 'skipped')
    strategy:
      # One target's failure should not cancel the other five. A Windows
      # runner crashing the macOS and Linux jobs (as it did in the first
      # v0.5.0 attempt) wastes runner minutes and hides downstream issues.
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
            archive: tar.gz
            os: linux
            ext: ""
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            archive: tar.gz
            os: linux
            ext: ""
          - target: aarch64-apple-darwin
            runner: macos-15
            archive: tar.gz
            os: macos
            ext: ""
          # Intel macOS (x86_64-apple-darwin) is intentionally omitted.
          # ort-sys (ONNX Runtime bindings pulled in transitively by fastembed,
          # which powers local embeddings for memory) does not publish prebuilt
          # binaries for x86_64-apple-darwin. Upstream workarounds are compiling
          # ONNX Runtime from source (adds ~30 min to every release build) or
          # switching fastembed's backend to `ort-tract` (multi-day change, not
          # a release-time fix). Apple deprecated Intel Macs in 2022; the ML
          # ecosystem has largely followed. If fastembed ever adopts a pure-Rust
          # or tract backend by default, restore this matrix entry.
          # Windows is intentionally omitted. The spacebot crate depends on
          # `daemonize` and `libc` unconditionally, which are Unix-only, so
          # `cargo build --release` would fail with ~50 errors before any
          # artifact is produced. Separately, bun on Windows cannot execute
          # the `.sh` preinstall hook or resolve `workspace:*` symlinks on
          # the first install, both of which block the frontend build step.
          # See `.scratchpad/2026-04-18-windows-build-gap.md` for the full
          # write-up and the re-enablement checklist. Mirrors the same
          # exclusion in `desktop-ci.yml`. When the Cargo.toml cfg-gating
          # lands, restore the Windows matrix entries here.
    runs-on: ${{ matrix.runner }}
    # 60 min, not 30. A cold cargo build of the full release graph (~1000
    # dep crates + thin LTO) takes ~30+ min on the standard runner; the
    # previous 30-min cap was cutting the FIRST cold build mid-link, which
    # combined with `cache-on-failure: false` (now removed) created a
    # deadlock — every release run was cold because no run had ever survived
    # long enough to save its cache. Once the cache warms, real wall time
    # drops to <10 min and the headroom is unused. See the cache step below
    # for the full root-cause writeup.
    timeout-minutes: 60
    defaults:
      run:
        shell: bash
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        # Cache scope: (release, target, toolchain, dep-tree). Other workflows
        # that use Swatinem/rust-cache without an explicit `key:` land in a
        # per-workflow scope, so entries from this job never share with ci.yml.
        #
        # `cache-on-failure` defaults to true, which is what we want here.
        # Earlier versions of this file pinned `cache-on-failure: false` on the
        # rationale that a "poisoned cache from a partial/OOM build should not
        # persist into the next release." That reasoning was wrong in practice
        # and produced a deadlock: every release run was cold because the
        # 30-min job timeout cut cargo build mid-link before the cache could
        # be saved, so the next run was also cold, ad infinitum. Verified
        # against the GH Actions cache API on 2026-04-19: zero `release-*`
        # cache entries had ever existed despite many release attempts.
        # Swatinem/rust-cache deduplicates by content hash and rustc
        # revalidates `.rmeta`/`.rlib` artifacts on every compile, so a
        # half-built target/release/ from a timed-out previous run is not
        # "poison"; rustc rebuilds anything that doesn't match.
        #
        # Cargo.lock is in the cache key so dep updates invalidate the cache.
        # Without it, a release after a `cargo update` could silently link
        # against stale dep artifacts. Adding the lockfile to the hash is the
        # idiomatic Swatinem/rust-cache pattern (its default behavior when no
        # explicit key: is set, which we override here for the release prefix).
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: release-${{ matrix.target }}-${{ hashFiles('rust-toolchain.toml', 'Cargo.lock') }}

      - name: Install system dependencies (Linux)
        if: matrix.os == 'linux'
        # Required by prost/tonic (OpenTelemetry OTLP) and chromiumoxide_cdp
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install system dependencies (macOS)
        if: matrix.os == 'macos'
        run: brew install protobuf

      - name: Install Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24

      - name: Install bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Build frontend
        env:
          SPACEBOT_SKIP_FRONTEND_BUILD: "1"
        run: |
          cd spaceui && bun install --frozen-lockfile && bun run build && cd ..
          cd interface && bun install --frozen-lockfile && cd ..
          ./scripts/build-opencode-embed.sh
          cd interface && bun run build

      - name: Determine version tag
        id: version
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          if [ -n "$INPUT_TAG" ]; then
            VERSION="$INPUT_TAG"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="dev-$(echo "$GITHUB_SHA" | head -c 7)"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build binary
        env:
          TARGET: ${{ matrix.target }}
          # Escalate bun-missing or bun-failed conditions to a hard failure
          # during the release cargo build. Prevents shipping a binary with
          # an empty UI if the frontend build silently fails.
          SPACEBOT_REQUIRE_FRONTEND_BUILD: "1"
        run: cargo build --release --target "$TARGET"

      - name: Package binary
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TARGET: ${{ matrix.target }}
          ARCHIVE: ${{ matrix.archive }}
          EXT: ${{ matrix.ext }}
        run: |
          cd "target/${TARGET}/release"
          mkdir -p "spacebot-${VERSION}-${TARGET}"
          cp "spacebot${EXT}" "spacebot-${VERSION}-${TARGET}/"
          if [ "$ARCHIVE" = "zip" ]; then
            7z a "../../../spacebot-${VERSION}-${TARGET}.${ARCHIVE}" "spacebot-${VERSION}-${TARGET}"
          else
            tar -czvf "../../../spacebot-${VERSION}-${TARGET}.${ARCHIVE}" "spacebot-${VERSION}-${TARGET}"
          fi

      - name: Upload binary artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: spacebot-${{ matrix.target }}
          path: spacebot-${{ steps.version.outputs.version }}-${{ matrix.target }}.${{ matrix.archive }}
          retention-days: 1

  build-docker:
    needs: [verify-version]
    if: always() && (needs.verify-version.result == 'success' || needs.verify-version.result == 'skipped')
    strategy:
      # One architecture's failure should not cancel the other. Each
      # architecture is a separate deliverable; we'd rather surface both
      # failures in one run than mask one behind the other.
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            platform: linux/amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version tag
        id: version
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          if [ -n "$INPUT_TAG" ]; then
            VERSION="$INPUT_TAG"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="dev-$(echo "$GITHUB_SHA" | head -c 7)"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Platform pair
        id: platform
        env:
          PLATFORM: ${{ matrix.platform }}
        run: echo "pair=$(echo "$PLATFORM" | tr '/' '-')" >> "$GITHUB_OUTPUT"

      - name: Warn if cache-to is disabled on non-tag build
        # `cache-to` is gated on tag builds below. An empty `cache-to` is a
        # valid buildx disable, so non-tag runs (e.g. manual workflow_dispatch
        # from a branch) would silently skip cache writes. Surface it as a
        # workflow annotation so operators see why the cache did not refresh.
        # TODO: scheduled retention prune for spacebot-cache:* versions older
        # than 90 days. Track via actions/delete-package-versions workflow.
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        env:
          REF: ${{ github.ref }}
        run: |
          echo "::warning title=Docker cache-to skipped::build-docker is running on non-tag ref '$REF'; cache-to is disabled to protect main's cache from branch pollution. The cache image will not be refreshed by this run."

      - name: Check cache image availability
        # Emit a notice when the registry cache image exists so operators can
        # tell "cold because missing" from "cold because 429/auth/etc." The
        # action's cache-from is best-effort and falls through silently on any
        # pull failure; this step makes the state explicit before the build.
        env:
          CACHE_REF: ${{ env.REGISTRY }}/${{ github.repository_owner }}/spacebot-cache:build-${{ steps.platform.outputs.pair }}
        run: |
          if docker buildx imagetools inspect "$CACHE_REF" >/dev/null 2>&1; then
            echo "::notice title=Docker cache hit::Cache image '$CACHE_REF' is available; warm cache expected."
          else
            echo "::notice title=Docker cache cold::Cache image '$CACHE_REF' not found (first run, deleted, or auth failure); this build will be cold."
          fi

      - name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.IMAGE }}:build-${{ steps.platform.outputs.pair }}
          # Docker build cache lives in a dedicated GHCR image rather than the
          # GHA cache service. `type=gha,mode=max` on this Dockerfile is capped
          # at 10 GB per repo. For a two-arch build that ceiling is the
          # bottleneck in practice: stable layers (apt, bun install, stub deps)
          # get evicted before the next release can reuse them. `type=registry`
          # has no such cap. The sidecar image `spacebot-cache:<arch>` is not a
          # release artifact; it lives at
          # `ghcr.io/<owner>/spacebot-cache:{build-linux-amd64,arm64}`.
          # `cache-to` is gated on tag builds so non-tag pushes (e.g. manual
          # workflow_dispatch) do not poison main's cache with branch layers.
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository_owner }}/spacebot-cache:build-${{ steps.platform.outputs.pair }}
          cache-to: ${{ startsWith(github.ref, 'refs/tags/v') && format('type=registry,ref={0}/{1}/spacebot-cache:build-{2},mode=max', env.REGISTRY, github.repository_owner, steps.platform.outputs.pair) || '' }}

  merge-docker:
    needs: build-docker
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest
        env:
          VERSION: ${{ needs.build-docker.outputs.version }}
        run: |
          docker buildx imagetools create \
            --tag "${{ env.IMAGE }}:${VERSION}" \
            --tag "${{ env.IMAGE }}:latest" \
            "${{ env.IMAGE }}:build-linux-amd64" \
            "${{ env.IMAGE }}:build-linux-arm64"

  create-release:
    needs:
      - build-binaries
      - merge-docker
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download all binary artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: binaries
          pattern: spacebot-*
          merge-multiple: false

      - name: Flatten artifacts
        run: |
          mkdir -p release-assets
          find binaries -name "*.tar.gz" -exec cp {} release-assets/ \;
          find binaries -name "*.zip" -exec cp {} release-assets/ \;
          ls -la release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ needs.build-binaries.outputs.version }}
          generate_release_notes: true
          files: release-assets/*
