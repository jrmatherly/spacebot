name: 🤖 Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

concurrency:
  # Cancel superseded reviews per-PR. Only the latest commit's review is
  # meaningful — if a developer pushes three commits in quick succession,
  # the first two reviews are stale before they finish posting. Unlike
  # claude.yml's invoke pattern, this workflow only fires on pull_request
  # state changes (no comment-driven triggers), so cancel-in-progress: true
  # cannot be hijacked by unrelated comment activity. No `github.ref !=
  # 'refs/heads/main'` carve-out needed because pull_request events never
  # fire on main.
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    # Skip automated dependency / bot PRs. CI gates (Check & Clippy, Test, Security Audit)
    # already validate mechanical bumps, and the action rejects bot actors by default.
    if: github.event.pull_request.user.type != 'Bot'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options

