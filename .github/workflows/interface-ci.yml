name: Interface CI

on:
  push:
    branches: [main]
    paths:
      - "interface/**"
      - "spaceui/packages/**"
      - ".github/workflows/interface-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "interface/**"
      - "spaceui/packages/**"
      - ".github/workflows/interface-ci.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Cancel superseded runs on PR branches (rapid review iteration), but let
  # main-branch runs complete. See ci.yml for the same rationale.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  quality:
    name: Interface Quality
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3"

      # interface/ declares spaceui packages as workspaces via
      # `"workspaces": ["../spaceui/packages/*"]`, so `bun install` in
      # interface/ symlinks `@spacedrive/*` directly to the local source.
      # spaceui must still be built beforehand because each subpackage's
      # package.json points `types` at `./dist/index.d.ts`, which tsc needs.
      - name: Install spaceui dependencies
        working-directory: spaceui
        run: bun install --frozen-lockfile

      - name: Build spaceui packages
        working-directory: spaceui
        run: bun run build

      - name: Install interface dependencies
        working-directory: interface
        run: bun install --frozen-lockfile

      - name: Typecheck
        working-directory: interface
        run: bunx tsc --noEmit
