name: Docker Compose validation

on:
  push:
    paths:
      - 'deploy/docker/**'
      - 'spacedrive/Dockerfile'
      - 'spacedrive/.dockerignore'
      - 'Dockerfile'
      - '.github/workflows/docker-compose.yml'
  pull_request:
    paths:
      - 'deploy/docker/**'
      - 'spacedrive/Dockerfile'
      - 'spacedrive/.dockerignore'
      - 'Dockerfile'
      - '.github/workflows/docker-compose.yml'
  # Manual trigger for the smoke job. The smoke job pulls the published
  # GHCR image, which does not exist in this fork until the first release
  # is cut. Maintainers invoke this post-release to verify the pull +
  # /api/health path end-to-end.
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'GHCR image tag to smoke-test (e.g. v0.4.1)'
        required: true
        default: 'latest'

jobs:
  validate:
    name: Validate compose config for every profile
    runs-on: ubuntu-latest
    env:
      # Placeholder digest + credentials so `docker compose config` parses.
      # Not used for actual runs.
      SPACEBOT_IMAGE_DIGEST: sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      SD_AUTH: "admin:validate"
      GF_ADMIN_USER: "admin"
      GF_ADMIN_PASSWORD: "validate"
    steps:
      - uses: actions/checkout@v4

      - name: Docker Compose version
        run: docker compose version

      - name: Validate default profile
        run: docker compose -f deploy/docker/docker-compose.yml --profile default config > /dev/null

      - name: Validate build profile
        run: docker compose -f deploy/docker/docker-compose.yml --profile build config > /dev/null

      - name: Validate spacedrive profile
        run: docker compose -f deploy/docker/docker-compose.yml --profile spacedrive config > /dev/null

      - name: Validate proxy profile
        run: docker compose -f deploy/docker/docker-compose.yml --profile proxy config > /dev/null

      - name: Validate observability profile
        run: docker compose -f deploy/docker/docker-compose.yml --profile observability config > /dev/null

      - name: Validate tooling profile
        run: docker compose -f deploy/docker/docker-compose.yml --profile tooling config > /dev/null

  smoke:
    name: Smoke-run default profile (manual)
    # Only runs on manual invocation. On push/PR, there is no guarantee
    # a published GHCR image exists at any given tag. Triggered via
    # `gh workflow run docker-compose.yml -f image_tag=<tag>` or the
    # Actions UI.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      # Needed if the GHCR package is private; harmless when public.
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image digest
        id: digest
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          # Authenticated manifest inspect after docker login above.
          # Fails the step (no fallback) if the tag does not exist.
          DIGEST=$(docker manifest inspect "ghcr.io/jrmatherly/spacebot:${IMAGE_TAG}" | jq -r '.config.digest // empty')
          if [ -z "$DIGEST" ]; then
            echo "::error::Could not resolve digest for ghcr.io/jrmatherly/spacebot:${IMAGE_TAG}. Has this tag been published?"
            exit 1
          fi
          echo "Resolved digest: $DIGEST"
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Create .env for smoke test
        env:
          DIGEST: ${{ steps.digest.outputs.digest }}
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          cat > deploy/docker/.env <<EOF
          ANTHROPIC_API_KEY=sk-ant-test-not-a-real-key
          SPACEBOT_IMAGE_TAG=${IMAGE_TAG}
          SPACEBOT_IMAGE_DIGEST=${DIGEST}
          RUST_LOG=info
          EOF

      - name: Start default stack
        run: docker compose -f deploy/docker/docker-compose.yml --profile default up -d

      - name: Wait for Spacebot health
        run: |
          for i in {1..30}; do
            if curl -sf http://127.0.0.1:19898/api/health > /dev/null; then
              echo "Spacebot healthy after $((i*5))s"
              exit 0
            fi
            sleep 5
          done
          echo "Spacebot failed to become healthy"
          docker compose -f deploy/docker/docker-compose.yml logs spacebot
          exit 1

      - name: Tear down
        if: always()
        run: docker compose -f deploy/docker/docker-compose.yml --profile default down -v
