name: CodeQL

# Advanced-setup CodeQL replacing the prior default-setup configuration.
# Motivation and full rationale: .scratchpad/2026-04-17-codeql-configuration-audit.md
#
# Structural decisions:
# - Three jobs, one per "shape" of analysis. Matrix strategy would force
#   every language onto identical triggers/runners, which defeats the
#   audit's whole purpose (scoping Swift to Tauri-touching PRs; freeing
#   disk on Rust; keeping Actions/JS-TS/Python cheap on every PR).
# - SHA-pinned actions to match .github/workflows/ci.yml conventions.
# - `build-mode: none` for Rust (GA'd Oct 2025) — pure source extraction,
#   no cargo compilation. Required because `[workspace] exclude` is a
#   Cargo concept the no-build extractor doesn't honor; paths-ignore in
#   .github/codeql/codeql-config.yml is the actual scoping lever.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly baseline — catches newly-published queries against untouched code.
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-rust:
    name: Analyze (rust)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    # Skip drafts to avoid burning runner time on WIP PRs. Push/schedule/dispatch
    # always run; PRs run only when not in draft state.
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Reclaim ~30 GB of runner disk before extraction. Belt-and-suspenders
      # against future vendored-tree additions; paths-ignore alone should
      # suffice but the audit explicitly calls for both.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          swap-storage: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          languages: rust
          build-mode: none
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          category: "/language:rust"

  analyze-actions-js-python:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.draft == false
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: javascript-typescript
            build-mode: none
          - language: python
            build-mode: none
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          category: "/language:${{ matrix.language }}"

  analyze-swift:
    name: Analyze (swift)
    runs-on: macos-latest
    timeout-minutes: 30
    # Swift scan is expensive (~17 min autobuild on macos-latest) and the
    # repo has exactly one Swift source file (30 LOC window shim). Run it
    # only when Tauri macOS code, the workflow itself, or the CodeQL config
    # changes — plus push-to-main, weekly cron, and manual dispatch as
    # baseline coverage. PR-scoped label `codeql-swift` forces a run if
    # needed for manual verification.
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.draft == false &&
       contains(github.event.pull_request.labels.*.name, 'codeql-swift'))
    # continue-on-error keeps Tauri dep bumps from red-gating unrelated PRs
    # until we have enough run history to trust the Swift pipeline.
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          languages: swift
          build-mode: autobuild
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          category: "/language:swift"
