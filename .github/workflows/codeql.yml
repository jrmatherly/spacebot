name: CodeQL

# Advanced-setup CodeQL replacing the prior default-setup configuration.
# Motivation and full rationale: .scratchpad/2026-04-17-codeql-configuration-audit.md
#
# Structural decisions:
# - Three jobs, one per "shape" of analysis. Matrix strategy would force
#   every language onto identical triggers/runners, which defeats the
#   audit's whole purpose (scoping Swift to Tauri-touching PRs; freeing
#   disk on Rust; keeping Actions/JS-TS/Python cheap on every PR).
# - SHA-pinned actions to match .github/workflows/ci.yml conventions.
# - `build-mode: none` for Rust (GA'd Oct 2025) — pure source extraction,
#   no cargo compilation. Required because `[workspace] exclude` is a
#   Cargo concept the no-build extractor doesn't honor; paths-ignore in
#   .github/codeql/codeql-config.yml is the actual scoping lever.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly baseline — catches newly-published queries against untouched code.
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-rust:
    name: Analyze (rust)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    # Skip drafts to avoid burning runner time on WIP PRs. Push/schedule/dispatch
    # always run; PRs run only when not in draft state.
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Reclaim ~30 GB of runner disk before extraction. Belt-and-suspenders
      # against future vendored-tree additions; paths-ignore alone should
      # suffice but the audit explicitly calls for both.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          swap-storage: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          languages: rust
          build-mode: none
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          category: "/language:rust"

  analyze-actions-js-python:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.draft == false
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: javascript-typescript
            build-mode: none
          - language: python
            build-mode: none
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          category: "/language:${{ matrix.language }}"

# Swift CodeQL analysis was removed 2026-04-19. Rationale: Spacebot itself has
# exactly 2 Swift files (a 30-LOC Tauri macOS window shim + its Package.swift)
# whose attack surface is nil for CodeQL's iOS-tuned query suite. The real
# Swift source (31 files) lives in `spacedrive/apps/mobile/` — a React Native
# + Expo iOS app. CodeQL Swift's autobuild ignored our `paths-ignore: spacedrive/**`
# config, walked the tree to find a buildable Swift/iOS project, hit the
# Spacedrive Podfile, and failed with "Cannot find module 'expo/package.json'"
# because we never install those node_modules in CI. The job was running with
# `continue-on-error: true`, so it wasn't blocking, but it was burning
# macos-latest runner minutes (10x Linux cost) and normalizing red X's in the
# Checks UI. If we ever want Swift scanning for the desktop shim specifically,
# re-add with `build-mode: none` and a narrow `paths: [desktop/**/*.swift]` scope.
