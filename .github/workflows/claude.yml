name: 🤖 Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

concurrency:
  # Serialize @claude invocations per-issue / per-PR per-event-type. The
  # event_name segment prevents an issue_comment on PR #100 from colliding
  # with a pull_request_review_comment on the same PR. The `||` fallback
  # handles the four trigger shapes: issue_comment + issues populate
  # event.issue.number; pull_request_review_comment + pull_request_review
  # populate event.pull_request.number.
  group: claude-invoke-${{ github.event_name }}-${{ github.event.pull_request.number || github.event.issue.number }}
  # Do NOT cancel in progress. Each @claude mention is a discrete user
  # request — an unrelated comment landing on the same issue while Claude
  # is working would otherwise kill a running agent mid-thought. Queueing
  # is the correct semantic; reference google-github-actions/run-gemini-cli#195
  # which documented this exact failure mode and resolved it the same way.
  cancel-in-progress: false

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          # Optional: Give a custom prompt to Claude. If this is not specified, Claude will perform the instructions specified in the comment that tagged it.
          # prompt: 'Update the pull request description to include a summary of changes.'

          # Optional: Add claude_args to customize behavior and configuration
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
          # claude_args: '--allowed-tools Bash(gh pr *)'

