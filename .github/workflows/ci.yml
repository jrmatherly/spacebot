name: 🦀 CI

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "migrations/**"
      - "vendor/**"
      - "build.rs"
      - "packages/api-client/**"
      - "justfile"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    # Mirror the push-side path filter on the negative side. Without this, any
    # docs-only PR triggers the full Rust check/clippy/test/typegen/audit
    # matrix on every push to the PR branch — wasted runner minutes and noisy
    # Checks UI. The push-side already path-FILTERS positively; PRs use
    # paths-ignore because PR diffs typically span more file types than push
    # commits, and an allow-list would be brittle as new code paths land.
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "openspec/**"
      - "presets/**"
      - "prompts/**"

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  # Cancel superseded runs on PR branches (rapid review iteration), but let
  # main-branch runs complete. Same rationale as codeql.yml: cancellation on
  # main produces a non-success terminal state that obscures whether the
  # latest code actually passes CI. Branch-protection isn't currently
  # enforced, but if/when it is added, completed-on-main runs are required
  # for the "required status check" model to work.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  check:
    name: Check & Clippy
    runs-on: ubuntu-24.04
    # 40 min, not 20. Same runway rationale as `test` below. The FIRST run
    # after the cache-key restructure (commit f4645a6) hits a cold cache
    # because the new `ci-rust-build` shared-key has no prior entry. Cold
    # compile of ~1000 dep crates takes ~25-30 min. Warm-cache runs stay at
    # 2-3 min (observed: 2m33s - 2m41s). 40 min is headroom only burnt
    # once, after any key restructure.
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install protoc
        # Required by prost/tonic (OpenTelemetry OTLP) and chromiumoxide_cdp
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy

      # Explicit `key:` forces this cache to share a slot with the `test` job
      # below (same prefix, same hash inputs). Both jobs compile the same dep
      # graph against the same target profile; sharing the cache avoids the
      # LRU-eviction trap that emptied the Test-job cache repeatedly when the
      # per-job auto-keys pushed the repo cache total over GitHub's 10 GB cap.
      # See .scratchpad/2026-04-20-ci-cache-eviction-fix.md for the full
      # writeup and cache inventory that surfaced this.
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: ci-rust-build
          key: ${{ hashFiles('rust-toolchain.toml', 'Cargo.lock') }}

      - name: cargo check
        run: cargo check --all-targets

      - name: cargo clippy
        run: cargo clippy --all-targets

  fmt:
    name: Format
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt

      - name: cargo fmt
        run: cargo fmt --all -- --check

  test:
    name: Test
    runs-on: ubuntu-24.04
    # 40 min, not 20. Test-job cache has been LRU-evicted repeatedly under
    # the 10 GB per-repo cap, forcing cold rebuilds of ~1000 dep crates. The
    # 20-min wall was killing the job mid-link on cold caches. With the
    # shared-key below, the Test job now reads from the same cache as
    # `check` (which runs first in the DAG and warms it), so warm-cache
    # runs finish in <5 min and the 40 min is cold-start headroom that
    # only burns on the first post-deduplication run. Mirrors the same
    # 30→60 min bump applied to `build-binaries` in release.yml for the
    # same class of cache-deadlock.
    timeout-minutes: 40
    needs: check
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install protoc
        # Required by prost/tonic (OpenTelemetry OTLP) and chromiumoxide_cdp
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      # Shared cache slot with the `check` job above. `shared-key` makes the
      # auto-generated `add-job-id-key` segment use the same value for both
      # jobs, while the `key` adds the Cargo.lock-sensitive content hash so
      # dep updates invalidate correctly. See the `check` job comment for
      # rationale.
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: ci-rust-build
          key: ${{ hashFiles('rust-toolchain.toml', 'Cargo.lock') }}

      - name: cargo test (lib)
        run: cargo test --lib

      - name: cargo test (integration compile check)
        run: cargo test --tests --no-run

  check-typegen:
    name: OpenAPI Typegen Drift
    runs-on: ubuntu-24.04
    # 30 min, not 15. Same cold-cache trap that bit the `test` job — the
    # `openapi-spec` bin target needs the full `spacebot` lib compiled before
    # it can run, and that compile was exceeding the 15-min wall on cold
    # caches. Warm-cache runs stay under 5 min; the 30 min is cold-start
    # headroom that only burns on the first post-deduplication run.
    timeout-minutes: 30
    # Guards the `just typegen` recipe and the committed
    # `packages/api-client/src/schema.d.ts`. Regenerates the OpenAPI spec from
    # utoipa-annotated Rust handlers and diffs the resulting TypeScript
    # schema against the committed file. A non-zero diff means either an API
    # route was added without running `just typegen`, or the recipe itself
    # drifted.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # This job only reads source, runs cargo + bunx, and diffs files.
          # It does not push commits, so do not persist the GITHUB_TOKEN into
          # `.git/config`. Closes the `zizmor/artipacked` alert on this job.
          persist-credentials: false

      - name: Install protoc
        # Required by prost/tonic (OpenTelemetry OTLP) and chromiumoxide_cdp
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      # Separate cache slot from `check` and `test` — this job compiles the
      # `openapi-spec` bin target (`cargo run --bin openapi-spec`), which has
      # different fingerprints than the lib tests. Using its own shared-key
      # keeps invalidation independent.
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: ci-rust-typegen
          key: ${{ hashFiles('rust-toolchain.toml', 'Cargo.lock') }}

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3"

      # Inlined `just check-typegen` to avoid adding a `just` toolchain to CI.
      # Must stay in sync with the `check-typegen` recipe in `justfile`.
      - name: Generate OpenAPI spec from Rust handlers
        run: cargo run --bin openapi-spec > /tmp/spacebot-openapi-check.json

      - name: Regenerate TypeScript schema
        run: bunx openapi-typescript /tmp/spacebot-openapi-check.json -o /tmp/spacebot-schema-check.d.ts

      - name: Diff against committed schema
        run: diff packages/api-client/src/schema.d.ts /tmp/spacebot-schema-check.d.ts

  audit:
    name: Security Audit
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    # Audit is a hard gate — only RUSTSEC-2023-0071 (rsa, never compiled) is ignored.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install cargo-audit
        # Fetch a prebuilt binary. `cargo install cargo-audit --locked` rebuilds
        # from source every run (observed ~2m 50s on ubuntu-24.04 per run
        # 24634503767); taiki-e/install-action fetches a pinned release asset
        # in seconds.
        uses: taiki-e/install-action@055f5df8c3f65ea01cd41e9dc855becd88953486 # v2.75.18
        with:
          # Pin tool version explicitly so upstream cargo-audit releases cannot
          # silently change audit output between CI runs.
          tool: cargo-audit@0.22.1

      - name: cargo audit
        # RUSTSEC-2023-0071: rsa Marvin Attack — pulled by sqlx-mysql but never compiled
        # (spacebot uses only the sqlite feature). No upstream fix available.
        run: cargo audit --ignore RUSTSEC-2023-0071
