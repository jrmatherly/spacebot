name: CI

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "migrations/**"
      - "vendor/**"
      - "build.rs"
      - "packages/api-client/**"
      - "justfile"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check & Clippy
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install protoc
        # Required by prost/tonic (OpenTelemetry OTLP) and chromiumoxide_cdp
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: cargo check
        run: cargo check --all-targets

      - name: cargo clippy
        run: cargo clippy --all-targets

  fmt:
    name: Format
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt

      - name: cargo fmt
        run: cargo fmt --all -- --check

  test:
    name: Test
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install protoc
        # Required by prost/tonic (OpenTelemetry OTLP) and chromiumoxide_cdp
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: cargo test (lib)
        run: cargo test --lib

      - name: cargo test (integration compile check)
        run: cargo test --tests --no-run

  check-typegen:
    name: OpenAPI Typegen Drift
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    # Guards the `just typegen` recipe and the committed
    # `packages/api-client/src/schema.d.ts`. Regenerates the OpenAPI spec from
    # utoipa-annotated Rust handlers and diffs the resulting TypeScript
    # schema against the committed file. A non-zero diff means either an API
    # route was added without running `just typegen`, or the recipe itself
    # drifted.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # This job only reads source, runs cargo + bunx, and diffs files.
          # It does not push commits, so do not persist the GITHUB_TOKEN into
          # `.git/config`. Closes the `zizmor/artipacked` alert on this job.
          persist-credentials: false

      - name: Install protoc
        # Required by prost/tonic (OpenTelemetry OTLP) and chromiumoxide_cdp
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3"

      # Inlined `just check-typegen` to avoid adding a `just` toolchain to CI.
      # Must stay in sync with the `check-typegen` recipe in `justfile`.
      - name: Generate OpenAPI spec from Rust handlers
        run: cargo run --bin openapi-spec > /tmp/spacebot-openapi-check.json

      - name: Regenerate TypeScript schema
        run: bunx openapi-typescript /tmp/spacebot-openapi-check.json -o /tmp/spacebot-schema-check.d.ts

      - name: Diff against committed schema
        run: diff packages/api-client/src/schema.d.ts /tmp/spacebot-schema-check.d.ts

  audit:
    name: Security Audit
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    # Audit is a hard gate — only RUSTSEC-2023-0071 (rsa, never compiled) is ignored.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install cargo-audit
        # Fetch a prebuilt binary. `cargo install cargo-audit --locked` rebuilds
        # from source every run (observed ~2m 50s on ubuntu-24.04 per run
        # 24634503767); taiki-e/install-action fetches a pinned release asset
        # in seconds.
        uses: taiki-e/install-action@055f5df8c3f65ea01cd41e9dc855becd88953486 # v2.75.18
        with:
          # Pin tool version explicitly so upstream cargo-audit releases cannot
          # silently change audit output between CI runs.
          tool: cargo-audit@0.22.1

      - name: cargo audit
        # RUSTSEC-2023-0071: rsa Marvin Attack — pulled by sqlx-mysql but never compiled
        # (spacebot uses only the sqlite feature). No upstream fix available.
        run: cargo audit --ignore RUSTSEC-2023-0071
