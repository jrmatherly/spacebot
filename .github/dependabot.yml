version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"

  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps"
    open-pull-requests-limit: 10

  - package-ecosystem: "npm"
    directory: "/interface"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps(interface)"
    open-pull-requests-limit: 5
