# Dependabot configuration
#
# This file controls UPDATE-PR scoping only. It does NOT control security-alert
# visibility on the Security dashboard. GitHub's security-alert engine scans
# every manifest in the repo regardless of what is listed here. To dismiss an
# alert, use the GitHub API (`gh api -X PATCH .../dependabot/alerts/{n}`).
#
# Vendored upstream paths (e.g., `spacedrive/**`) are deliberately omitted:
# spacebot does not compile those lockfiles, so automated update PRs against
# them are not useful.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"

  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps"
    open-pull-requests-limit: 10
    # Major-version bumps that require dedicated migration PRs are pinned
    # below. Dependabot continues to surface patch and minor updates within
    # the allowed range; major updates surface only when the pin is lifted
    # (after the API-migration PR lands).
    ignore:
      # jsonwebtoken 10.x has breaking API changes (E0308 mismatched-types
      # at every call site in src/auth/{jwks,middleware}.rs as of PR #90).
      # Migration tracked separately. Re-evaluate after the auth-refresh
      # PR lands. See PR #90 for the failure surface.
      - dependency-name: "jsonwebtoken"
        update-types: ["version-update:semver-major"]
      # nom 8.x has breaking API changes (Parser::parse signature, error
      # type bounds, FindToken removal). Spacebot pulls nom transitively
      # via the vendored imap-proto crate. Migration would touch
      # vendor/imap-proto/. Re-evaluate after imap-proto upstream releases
      # nom-8 support OR the vendored copy is forked. See PR #100.
      - dependency-name: "nom"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "cargo"
    directory: "/desktop/src-tauri"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps(desktop)"
    open-pull-requests-limit: 5

  - package-ecosystem: "npm"
    directory: "/interface"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps(interface)"
    open-pull-requests-limit: 5
    # jsdom 27.x ships ESM-only `require(esm)` semantics that break
    # vitest 4 (see https://github.com/vitest-dev/vitest/issues/9279
    # and https://github.com/vitest-dev/vitest/issues/9281). Pin at
    # ^25 until either the upstream fix lands OR we migrate to
    # happy-dom. Re-evaluate after vitest 4.2+ ships.
    ignore:
      - dependency-name: "jsdom"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "npm"
    directory: "/packages/api-client"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps(api-client)"
    open-pull-requests-limit: 5
    # Same jsdom-vs-vitest-4 incompatibility as /interface above.
    ignore:
      - dependency-name: "jsdom"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "npm"
    directory: "/spaceui"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps(spaceui)"
    open-pull-requests-limit: 5
    groups:
      storybook:
        patterns:
          - "storybook"
          - "@storybook/*"
          - "@chromatic-com/storybook"
    # The root spaceui/bun.lock hoists @types/node from the workspace
    # member that declares it (.storybook). Dependabot scans the hoisted
    # dep under this root ecosystem and opens PRs titled "in /spaceui"
    # that actually modify .storybook/package.json. Duplicate the Node 24
    # pin here so the hoisted resolution doesn't bypass the policy. See
    # the matching block under /spaceui/.storybook.
    ignore:
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "npm"
    directory: "/spaceui/.storybook"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps(spaceui-storybook)"
    open-pull-requests-limit: 3
    groups:
      storybook:
        patterns:
          - "storybook"
          - "@storybook/*"
          - "@chromatic-com/storybook"
    # Pin @types/node to match the project's Node 24 policy. Major bumps
    # (25.x, 26.x, …) must be proposed manually after the runtime Node
    # version in .github/workflows/release.yml is bumped.
    ignore:
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "npm"
    directory: "/spaceui/examples/showcase"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps(spaceui-showcase)"
    open-pull-requests-limit: 3

  - package-ecosystem: "npm"
    directory: "/docs"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps(docs)"
    open-pull-requests-limit: 5
    # Pin @types/node to match the project's Node 24 policy. Major bumps
    # (25.x, 26.x, …) must be proposed manually after the runtime Node
    # version in .github/workflows/release.yml is bumped.
    ignore:
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
